<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Police Badge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="badge-root" class="hidden">
        <div class="badge-scrim"></div>
        <div class="badge-frame">
            <img id="wallet-img" class="wallet-img" src="assets/wallet-nophoto.png" alt="">
            <div id="photo-wrap" class="photo-wrap hidden">
                <img id="photo-img" class="photo-img" src="" alt="">
            </div>
            <div class="identity">
                <p id="rank-text" class="rank-text"></p>
                <p id="name-text" class="name-text"></p>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
